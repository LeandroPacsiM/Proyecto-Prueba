<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Perritos</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:24px;background:#f7f7f9;color:#222}
    header{display:flex;align-items:center;gap:12px}
    h1{margin:0;font-size:1.4rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:14px}
    .card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
    .avatar{font-size:44px}
    p{margin:.5rem 0 0;font-size:.95rem}
    footer{margin-top:18px;font-size:.85rem;color:#666}
  </style>
</head>
<body>
  <header>
    <div class="avatar">🐶</div>
    <h1>Perritos adorables</h1>
  </header>

  <div class="grid">
    <article class="card">
      <div class="avatar">🐕</div>
      <strong>Max</strong>
      <p>3 años · Juguetón</p>
    </article>

    <article class="card">
      <div class="avatar">🐩</div>
      <strong>Luna</strong>
      <p>2 años · Activa</p>
    </article>

    <article class="card">
      <div class="avatar">🦮</div>
      <strong>Roco</strong>
      <p>5 años · Tranquilo</p>
    </article>
  </div>

  <footer>
    Página simple de ejemplo — ¡comparte fotos de tu perrito!
  </footer>
</body>
</html>
